<div class="section-header">
  <h3>Payment Information</h3>
  <p>Secure payment details</p>
</div>

<div class="section-content">
  <nmf-mat-select
    formControlName="paymentMethod"
    label="Payment Method"
    [options]="paymentMethods"
    placeholder="Select payment method"
  />

  <nmf-mat-text
    formControlName="cardNumber"
    label="Card Number"
    placeholder="1234 5678 9012 3456"
  />

  <div class="form-row">
    <nmf-mat-select
      formControlName="expiryMonth"
      label="Expiry Month"
      [options]="months"
      placeholder="Month"
    />
    <nmf-mat-select
      formControlName="expiryYear"
      label="Expiry Year"
      [options]="years"
      placeholder="Year"
    />
  </div>

  <div class="form-row">
    <nmf-mat-text
      formControlName="cvv"
      label="CVV"
      type="password"
      placeholder="123"
    />
    <nmf-mat-currency
      formControlName="billingAmount"
      label="Billing Amount"
      placeholder="0.00"
    />
  </div>
</div>
