<div class="flex flex-col h-full">
  <h1 class="text-2xl font-semibold text-neutral-800 my-0">
    {{ title() }}
  </h1>

  @if (sourceUrl()) {
    <a
      [href]="sourceUrl()"
      target="_blank"
      class="text-sm text-emerald-700 no-underline hover:text-emerald-900 mt-1"
    >
      View source on GitHub
    </a>
  }

  <div
    class="flex flex-col gap-4 mt-4 border-t-2 flex-1 min-h-0 overflow-y-auto p-4"
  >
    <ng-content></ng-content>
  </div>
</div>
