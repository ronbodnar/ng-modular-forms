<button
  type="submit"
  mat-raised-button
  class="bg-emerald-700! text-mist-200!"
  [disabled]="loading()"
>
  <span class="transition-opacity duration-150" [class.opacity-0]="loading()">
    {{ label() }}
  </span>

  @if (loading()) {
    <div
      class="absolute top-0 left-0 w-full h-full flex items-center justify-center"
    >
      <mat-spinner
        class="white-spinner m-auto"
        diameter="16"
        strokeWidth="2"
      ></mat-spinner>
    </div>
  }
</button>
